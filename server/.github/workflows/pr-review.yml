name: AI Code Review

on:
  pull_request:
    types: [labeled]

jobs:
  review:
    # Only run if the specific label "gpt-review" is added
    if: github.event.label.name == 'Needs-review'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # Example using a community action for AI review
      # You will need to add an API Key to your Repo Secrets
      - name: ChatGpt Reviewer
        uses: mshick/add-pr-comment@v2
        with:
          message: |
            ### 🤖 Automated Code Review Started
            The "gpt-review" label was detected. I am now analyzing the changes...
          
      - name: PR Reviewer
        uses: anc95/ChatGPT-CodeReview@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Optional: Choose your model and language
          MODEL: gpt-5.4
          LANGUAGE: English
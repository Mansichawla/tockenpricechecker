name: PR Auto Review

on:
  pull_request:
    types: [labeled]

jobs:
  review:
    runs-on: ubuntu-latest

    # ✅ FIXED CONDITION
    if: github.event.label.name == 'Needs review'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ IMPORTANT: fetch full history for diff
      - name: Fetch all branches
        run: git fetch --all

      - name: Get PR files
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...origin/${{ github.head_ref }})
          echo "FILES=$FILES" >> $GITHUB_ENV

      - name: Review Code
        run: |
          COMMENT=""
          for file in $FILES; do
            if [[ "$file" == *.js ]]; then
              if grep -q "console.log" "$file"; then
                COMMENT="$COMMENT\n❌ Avoid console.log in $file"
              fi
            fi
          done

          echo "COMMENT<<EOF" >> $GITHUB_ENV
          echo -e "$COMMENT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Comment on PR
        if: env.COMMENT != ''
        run: |
          curl -X POST \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
          -d "$(jq -nc --arg body "$COMMENT" '{body:$body}')"
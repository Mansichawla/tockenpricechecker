name: PR Auto Review

on:
  pull_request:
    types: [labeled]

jobs:
  review:
    runs-on: ubuntu-latest

    if: github.event.label.name == 'Needs review'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch all branches
        run: git fetch --all

      - name: Review PR
        id: review
        run: |
          COMMENT=""

          FILES=$(git diff --name-only origin/${{ github.base_ref }}...origin/${{ github.head_ref }})

          echo "Changed files:"
          echo "$FILES"

          echo "$FILES" | while IFS= read -r file; do
            # skip empty lines
            if [ -z "$file" ]; then
              continue
            fi

            # skip .env files (important)
            if [[ "$file" == *.env ]]; then
              continue
            fi

            if [[ "$file" == *.js ]]; then
              if [ -f "$file" ]; then

                if grep -q "console.log" "$file"; then
                  COMMENT="$COMMENT\n❌ Avoid console.log in $file"
                fi

                if grep -q "TODO" "$file"; then
                  COMMENT="$COMMENT\n⚠️ TODO found in $file"
                fi

              fi
            fi
          done

          # default message
          if [ -z "$COMMENT" ]; then
            COMMENT="✅ PR passed all automated checks!"
          fi

          # save comment safely
          echo "comment<<EOF" >> $GITHUB_OUTPUT
          echo -e "$COMMENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment on PR
        run: |
          curl -s -X POST \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
          -d "$(jq -nc --arg body "${{ steps.review.outputs.comment }}" '{body:$body}')"
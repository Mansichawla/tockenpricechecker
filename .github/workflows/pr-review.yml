name: PR Auto Review

on:
  pull_request:
    types: [labeled]

jobs:
  review:
    if: github.event.label.name == 'Needs-review'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get PR files
        run: |
          echo "FILES=$(git diff --name-only origin/${{ github.base_ref }}...${{ github.head_ref }})" >> $GITHUB_ENV

      - name: Review Code
        run: |
          COMMENT=""
          for file in $FILES; do
            if [[ "$file" == *.js ]]; then
              if grep -q "console.log" "$file"; then
                COMMENT="$COMMENT\n❌ Avoid console.log in $file"
              fi
            fi
          done
          echo "COMMENT<<EOF" >> $GITHUB_ENV
          echo -e "$COMMENT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Comment on PR
        if: env.COMMENT != ''
        run: |
          curl -X POST \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
          -d "{\"body\":\"${COMMENT}\"}"